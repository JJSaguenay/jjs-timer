<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JJS Timer — TV</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --col-bg:      #0c0c0c;
      --col-text:    #ffffff;
      --col-dim:     #4a4a4a;
      --col-muted:   #222;
      --col-work:    #C8102E;   /* Rouge JJS */
      --col-rest:    #888888;   /* Gris repos */
      --col-warning: #E8600A;   /* Orange avertissement */
      --col-finish:  #C8102E;   /* Rouge JJS */
    }

    html, body {
      width: 100%; height: 100vh;
      background: var(--col-bg);
      color: var(--col-text);
      font-family: 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    /* ── Logo ─────────────────────────── */
    #logo-wrap {
      position: absolute;
      top: 2.5vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5vh;
    }

    #gym-logo {
      height: clamp(40px, 7vh, 90px);
      width: auto;
      /* Rend le fond blanc transparent sur fond noir tout en gardant le rouge intact */
      filter: invert(1) hue-rotate(180deg);
      opacity: 0.92;
    }

    #gym-name {
      font-size: clamp(10px, 1.3vw, 20px);
      font-weight: 300;
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: var(--col-dim);
    }

    /* ── Mode label ───────────────────── */
    #mode-label {
      position: absolute;
      top: calc(2.5vh + clamp(50px, 9.5vh, 120px));
      font-size: clamp(10px, 1.1vw, 16px);
      font-weight: 500;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: #333;
    }

    /* ── Phase label ──────────────────── */
    #phase-label {
      font-size: clamp(20px, 4vw, 56px);
      font-weight: 700;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--col-work);
      min-height: 1.2em;
      margin-bottom: 1vh;
      transition: color 0.4s;
    }

    /* ── Timer ────────────────────────── */
    #timer {
      font-size: clamp(80px, 26vw, 420px);
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      line-height: 0.9;
      letter-spacing: -0.02em;
      color: var(--col-text);
      transition: color 0.4s;
      will-change: transform;
    }

    /* ── Round info ───────────────────── */
    #round-info {
      font-size: clamp(14px, 2.2vw, 34px);
      font-weight: 400;
      letter-spacing: 0.25em;
      color: var(--col-dim);
      margin-top: 2vh;
      min-height: 1.4em;
    }

    /* ── Round dots ───────────────────── */
    #round-dots {
      display: flex;
      gap: clamp(6px, 1.2vw, 18px);
      margin-top: 2vh;
      min-height: clamp(10px, 1.5vw, 22px);
    }
    .dot {
      width: clamp(10px, 1.4vw, 20px);
      height: clamp(10px, 1.4vw, 20px);
      border-radius: 50%;
      background: var(--col-muted);
      transition: background 0.3s;
    }
    .dot.done    { background: #2a2a2a; }
    .dot.current { background: var(--col-work); }
    .dot.current.rest-dot { background: var(--col-rest); }

    /* ── Barre rouge décorative ───────── */
    #accent-bar {
      position: absolute;
      bottom: 0;
      left: 0; right: 0;
      height: 4px;
      background: var(--col-work);
      opacity: 0.7;
    }

    /* ── Status bar ───────────────────── */
    #status-bar {
      position: absolute;
      bottom: 1.8vh;
      font-size: clamp(12px, 1.5vw, 22px);
      letter-spacing: 0.4em;
      color: var(--col-dim);
      text-transform: uppercase;
    }

    /* ── Overlay son ─────────────────── */
    #sound-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2vh;
      z-index: 99;
      cursor: pointer;
    }
    #sound-overlay.hidden { display: none; }
    #sound-overlay span {
      font-size: clamp(16px, 2.5vw, 36px);
      letter-spacing: 0.3em;
      color: #666;
    }
    #sound-overlay strong {
      font-size: clamp(22px, 4vw, 58px);
      letter-spacing: 0.4em;
      font-weight: 700;
      color: var(--col-work);
    }

    /* ── Overlay 3-2-1 ───────────────── */
    #countdown-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,10,10,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3vh;
      z-index: 50;
    }
    #countdown-overlay.hidden { display: none; }

    #countdown-number {
      font-size: clamp(160px, 42vw, 640px);
      font-weight: 900;
      color: #fff;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    #countdown-number.go {
      font-size: clamp(60px, 14vw, 200px);
      color: var(--col-work);
      letter-spacing: 0.12em;
    }

    @keyframes pop-in {
      0%   { transform: scale(1.4); opacity: 0; }
      60%  { transform: scale(0.95); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .pop { animation: pop-in 0.32s cubic-bezier(0.22,1,0.36,1) both; }

    /* ══ États ══════════════════════════════════════════════ */

    /* Repos */
    body.phase-rest #phase-label { color: var(--col-rest); }
    body.phase-rest #timer       { color: #cccccc; }

    /* Avertissement */
    body.warning #timer       { color: var(--col-warning); }
    body.warning #phase-label { color: var(--col-warning); }
    @keyframes pulse-warn {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.018); }
    }
    body.warning #timer { animation: pulse-warn 0.5s ease-in-out infinite; }

    /* Pause */
    body.paused #timer      { opacity: 0.4; }
    body.paused #status-bar { color: var(--col-warning); }

    /* Terminé */
    body.finished #timer       { color: var(--col-finish); }
    body.finished #phase-label { color: var(--col-finish); }
    @keyframes flash-done {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.2; }
    }
    body.finished #timer { animation: flash-done 1s ease-in-out infinite; }
  </style>
</head>
<body>

  <!-- Overlay activation son -->
  <div id="sound-overlay">
    <span>APPUYER POUR ACTIVER</span>
    <strong>▶ OK</strong>
    <span style="font-size:clamp(11px,1.4vw,20px); margin-top:1vh; color:#444">
      télécommande ou clic
    </span>
  </div>

  <!-- Overlay 3-2-1 -->
  <div id="countdown-overlay" class="hidden">
    <div id="countdown-number">3</div>
  </div>

  <!-- Logo + nom -->
  <div id="logo-wrap">
    <img id="gym-logo" src="/logo.png" alt="Jiu-Jitsu Saguenay" onerror="this.style.display='none';document.getElementById('gym-name').style.color='#555'">
    <div id="gym-name">JIU-JITSU SAGUENAY</div>
  </div>

  <div id="mode-label"></div>
  <div id="phase-label"></div>
  <div id="timer">—:——</div>
  <div id="round-info"></div>
  <div id="round-dots"></div>
  <div id="status-bar">EN ATTENTE</div>
  <div id="accent-bar"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ── Audio ──────────────────────────────────────────────────────────
    let audioCtx = null;

    function unlockAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      document.getElementById('sound-overlay').classList.add('hidden');
    }

    document.getElementById('sound-overlay').addEventListener('click', unlockAudio);
    document.addEventListener('keydown', unlockAudio, { once: true });

    function beep(freq, dur, vol = 0.6, delay = 0) {
      if (!audioCtx) return;
      try {
        const t    = audioCtx.currentTime + delay;
        const osc  = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type            = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(vol, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
        osc.start(t);
        osc.stop(t + dur + 0.05);
      } catch(e) {}
    }

    function playGo() {
      beep(587, 0.10, 0.55, 0.00);
      beep(659, 0.10, 0.55, 0.11);
      beep(880, 0.40, 0.60, 0.22);
    }

    function playEvent(event, phase) {
      switch(event) {
        case 'resumed':
          beep(880, 0.12, 0.4);
          break;
        case 'phase_change':
          if (phase === 'rest') {
            beep(523, 0.18); beep(440, 0.28, 0.6, 0.20);
          } else {
            beep(880, 0.12); beep(880, 0.12, 0.6, 0.14); beep(1047, 0.30, 0.6, 0.28);
          }
          break;
        case 'finished':
          beep(880, 0.35); beep(880, 0.35, 0.6, 0.40); beep(880, 0.55, 0.6, 0.80);
          break;
      }
    }

    // ── Rendu ──────────────────────────────────────────────────────────
    const timerEl     = document.getElementById('timer');
    const phaseEl     = document.getElementById('phase-label');
    const modeLabelEl = document.getElementById('mode-label');
    const roundEl     = document.getElementById('round-info');
    const dotsEl      = document.getElementById('round-dots');
    const statusEl    = document.getElementById('status-bar');
    const cdOverlay   = document.getElementById('countdown-overlay');
    const cdNumEl     = document.getElementById('countdown-number');
    const body        = document.body;

    function fmt(s) {
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return `${m}:${String(sec).padStart(2,'0')}`;
    }

    const PHASE_LABELS = {
      countdown: { work: '' },
      hiit:      { work: 'TRAVAIL', rest: 'REPOS' },
      grappling: { work: 'ROUND',   rest: 'REPOS' }
    };

    const MODE_LABELS = {
      countdown: 'COMPTE À REBOURS',
      hiit:      'INTERVALLES HIIT',
      grappling: 'GRAPPLING TIMER'
    };

    let lastEventSeq = -1;
    let lastStatus   = '';
    let goTimeout    = null;

    function triggerPop() {
      cdNumEl.classList.remove('pop');
      void cdNumEl.offsetWidth;
      cdNumEl.classList.add('pop');
    }

    const socket = io();

    socket.on('state', (s) => {

      // ── Compte à rebours 3-2-1 ──────────────────────────────────────
      if (s.status === 'countdown') {
        cdOverlay.classList.remove('hidden');
        cdNumEl.className = 'pop';
        cdNumEl.textContent = s.countdownRemaining;
        triggerPop();
        beep(880, 0.10, 0.5);
        lastStatus = 'countdown';
        return;
      }

      // ── PARTEZ ! ─────────────────────────────────────────────────────
      if (s.event === 'started' && lastStatus === 'countdown') {
        cdOverlay.classList.remove('hidden');
        cdNumEl.className = 'go pop';
        cdNumEl.textContent = 'PARTEZ !';
        triggerPop();
        playGo();
        clearTimeout(goTimeout);
        goTimeout = setTimeout(() => cdOverlay.classList.add('hidden'), 700);
      } else if (s.status !== 'countdown') {
        if (lastStatus !== 'countdown') cdOverlay.classList.add('hidden');
      }

      lastStatus = s.status;

      // ── Sons ─────────────────────────────────────────────────────────
      const isNewEvent = s.eventSeq !== lastEventSeq;
      lastEventSeq = s.eventSeq;

      if (isNewEvent && s.event) {
        if (s.event === 'warning') {
          beep(1047, 0.08, 0.35);
        } else if (s.event !== 'countdown_tick') {
          playEvent(s.event, s.phase);
        }
      }

      // ── Affichage ─────────────────────────────────────────────────
      timerEl.textContent = s.status === 'idle' ? '—:——' : fmt(s.phaseRemaining);

      const labels = PHASE_LABELS[s.mode] || {};
      phaseEl.textContent = s.status === 'idle' ? '' : (labels[s.phase] || '');

      modeLabelEl.textContent = s.status === 'idle' ? (MODE_LABELS[s.mode] || '') : '';

      if (s.mode !== 'countdown' && s.status !== 'idle') {
        roundEl.textContent = `ROUND ${s.currentRound} / ${s.totalRounds}`;
      } else {
        roundEl.textContent = '';
      }

      const statusMap = {
        idle:     'EN ATTENTE',
        running:  '',
        paused:   '⏸  PAUSE',
        finished: '✓  TERMINÉ'
      };
      statusEl.textContent = statusMap[s.status] ?? '';

      body.className = '';
      if (s.status === 'paused')   body.classList.add('paused');
      if (s.status === 'finished') body.classList.add('finished');
      if (s.phase === 'rest' && s.status === 'running')
        body.classList.add('phase-rest');
      if (s.status === 'running' && s.phaseRemaining <= 10 && s.phaseRemaining > 0)
        body.classList.add('warning');

      dotsEl.innerHTML = '';
      if (s.totalRounds > 1 && s.mode !== 'countdown') {
        for (let i = 1; i <= s.totalRounds; i++) {
          const d = document.createElement('div');
          d.className = 'dot';
          if (i < s.currentRound)        d.classList.add('done');
          else if (i === s.currentRound) {
            d.classList.add('current');
            if (s.phase === 'rest') d.classList.add('rest-dot');
          }
          dotsEl.appendChild(d);
        }
      }
    });

    // ── Télécommande Fire Stick ────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      unlockAudio();
      if (e.key === 'Enter' || e.key === ' ' || e.keyCode === 13) {
        socket.emit('command', { action: 'toggle' });
        e.preventDefault();
      } else if (e.key === 'Backspace' || e.key === 'Escape' || e.keyCode === 8) {
        socket.emit('command', { action: 'reset' });
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
