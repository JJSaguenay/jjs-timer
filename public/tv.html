<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JJS Timer — TV</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --col-bg:      #0c0c0c;
      --col-text:    #ffffff;
      --col-dim:     #4a4a4a;
      --col-muted:   #1e1e1e;
      --col-work:    #C8102E;
      --col-rest:    #888888;
      --col-warning: #E8600A;
      --col-finish:  #C8102E;
    }

    html, body {
      width: 100%; height: 100vh;
      background: var(--col-bg);
      color: var(--col-text);
      font-family: 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* ── Centrage absolu du timer ─────── */
    #center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* ── Timer ────────────────────────── */
    #timer {
      font-size: 35vw;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      line-height: 0.88;
      letter-spacing: -0.03em;
      color: var(--col-text);
      transition: color 0.4s;
      will-change: transform, color;
      text-align: center;
    }

    /* ── Phase label — sous le timer ──── */
    #phase-label {
      font-size: clamp(18px, 3.5vw, 52px);
      font-weight: 700;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--col-work);
      min-height: 1.1em;
      margin-top: 1.5vh;
      transition: color 0.4s;
    }

    /* ── Round dots ───────────────────── */
    #round-dots {
      display: flex;
      gap: clamp(8px, 1.4vw, 22px);
      margin-top: 2vh;
      min-height: clamp(12px, 1.8vw, 26px);
    }
    .dot {
      width: clamp(12px, 1.6vw, 24px);
      height: clamp(12px, 1.6vw, 24px);
      border-radius: 50%;
      background: var(--col-muted);
      transition: background 0.3s;
    }
    .dot.done    { background: #2a2a2a; }
    .dot.current { background: var(--col-work); }
    .dot.current.rest-dot { background: var(--col-rest); }

    /* ── Logo — coin supérieur gauche ──── */
    #logo-wrap {
      position: absolute;
      top: 3vh;
      left: 0; right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6vh;
      pointer-events: none;
    }
    #gym-logo {
      height: clamp(38px, 6.5vh, 82px);
      width: auto;
      filter: invert(1) hue-rotate(180deg);
      opacity: 0.90;
    }
    #gym-name {
      font-size: clamp(9px, 1.1vw, 18px);
      font-weight: 300;
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: var(--col-dim);
    }

    /* ── Mode label ───────────────────── */
    #mode-label {
      position: absolute;
      top: 3vh;
      right: 3vw;
      font-size: clamp(10px, 1vw, 15px);
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #2e2e2e;
    }

    /* ── Round info ───────────────────── */
    #round-info {
      position: absolute;
      top: 3vh;
      left: 3vw;
      font-size: clamp(12px, 1.6vw, 26px);
      font-weight: 600;
      letter-spacing: 0.2em;
      color: var(--col-dim);
    }

    /* ── Status bar ───────────────────── */
    #status-bar {
      position: absolute;
      bottom: 3vh;
      left: 0; right: 0;
      text-align: center;
      font-size: clamp(12px, 1.4vw, 22px);
      letter-spacing: 0.45em;
      color: var(--col-dim);
      text-transform: uppercase;
    }

    /* ── Barre rouge bas ─────────────── */
    #accent-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 5px;
      background: var(--col-work);
      opacity: 0.6;
    }

    /* ── Overlay son ─────────────────── */
    #sound-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.90);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3vh;
      z-index: 99;
      cursor: pointer;
    }
    #sound-overlay.hidden { display: none; }
    #sound-overlay .so-hint  { font-size: clamp(14px, 2vw, 28px); letter-spacing: 0.35em; color: #555; }
    #sound-overlay .so-cta   { font-size: clamp(28px, 5vw, 72px); font-weight: 900; letter-spacing: 0.3em; color: var(--col-work); }
    #sound-overlay .so-small { font-size: clamp(11px, 1.2vw, 18px); color: #333; letter-spacing: 0.3em; }

    /* ── Overlay 3-2-1 ───────────────── */
    #countdown-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,10,10,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }
    #countdown-overlay.hidden { display: none; }
    #countdown-number {
      font-size: 45vw;
      font-weight: 900;
      color: #fff;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      letter-spacing: -0.04em;
    }
    #countdown-number.go {
      font-size: clamp(60px, 16vw, 240px);
      color: var(--col-work);
      letter-spacing: 0.08em;
    }
    @keyframes pop-in {
      0%   { transform: scale(1.5); opacity: 0; }
      60%  { transform: scale(0.93); opacity: 1; }
      100% { transform: scale(1);   opacity: 1; }
    }
    .pop { animation: pop-in 0.3s cubic-bezier(0.22,1,0.36,1) both; }

    /* ══ États ══════════════════════════════════════════════ */
    body.phase-rest #phase-label { color: var(--col-rest); }
    body.phase-rest #timer       { color: #b0b0b0; }

    body.warning #timer        { color: var(--col-warning); }
    body.warning #phase-label  { color: var(--col-warning); }
    @keyframes pulse-warn {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.02); }
    }
    body.warning #timer { animation: pulse-warn 0.45s ease-in-out infinite; }

    body.paused #timer      { opacity: 0.38; }
    body.paused #status-bar { color: var(--col-warning); }

    body.finished #timer       { color: var(--col-finish); }
    body.finished #phase-label { color: var(--col-finish); }
    @keyframes flash-done {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.15; }
    }
    body.finished #timer { animation: flash-done 0.9s ease-in-out infinite; }
  </style>
</head>
<body>

  <!-- Overlay son -->
  <div id="sound-overlay">
    <div class="so-hint">APPUYER POUR ACTIVER</div>
    <div class="so-cta">▶ OK</div>
    <div class="so-small">TÉLÉCOMMANDE OU CLIC</div>
  </div>

  <!-- Overlay 3-2-1 -->
  <div id="countdown-overlay" class="hidden">
    <div id="countdown-number">3</div>
  </div>

  <!-- Logo -->
  <div id="logo-wrap">
    <img id="gym-logo" src="/logo.png" alt="Jiu-Jitsu Saguenay"
         onerror="this.style.display='none'">
    <div id="gym-name">JIU-JITSU SAGUENAY</div>
  </div>

  <!-- Mode (coin droit) -->
  <div id="mode-label"></div>

  <!-- Round (coin gauche) -->
  <div id="round-info"></div>

  <!-- Centre absolu : timer + phase + dots -->
  <div id="center">
    <div id="timer">—:——</div>
    <div id="phase-label"></div>
    <div id="round-dots"></div>
  </div>

  <!-- Status bas -->
  <div id="status-bar">EN ATTENTE</div>
  <div id="accent-bar"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ── Audio ──────────────────────────────────────────────────────────
    let audioCtx = null;
    let audioUnlocked = false;

    function unlockAudio() {
      if (audioUnlocked) return;
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        audioCtx.resume().then(() => {
          audioUnlocked = true;
          document.getElementById('sound-overlay').classList.add('hidden');
        });
      } catch(e) {
        console.warn('Audio unlock failed:', e);
      }
    }

    // Tenter à chaque interaction utilisateur
    ['click', 'touchstart', 'keydown', 'pointerdown'].forEach(evt => {
      document.addEventListener(evt, unlockAudio);
    });

    // Re-tenter à chaque fois que l'onglet redevient actif
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden && audioCtx?.state === 'suspended') {
        audioCtx.resume();
      }
    });

    function beep(freq, dur, vol = 0.6, delay = 0) {
      if (!audioCtx) return;
      try {
        const t    = audioCtx.currentTime + delay;
        const osc  = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type            = 'sine';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(vol, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
        osc.start(t);
        osc.stop(t + dur + 0.05);
      } catch(e) {}
    }

    function playGo() {
      beep(587, 0.10, 0.55, 0.00);
      beep(659, 0.10, 0.55, 0.11);
      beep(880, 0.45, 0.65, 0.22);
    }

    function playEvent(event, phase) {
      switch(event) {
        case 'resumed':
          beep(880, 0.12, 0.45);
          break;
        case 'phase_change':
          if (phase === 'rest') {
            beep(523, 0.18); beep(440, 0.28, 0.6, 0.20);
          } else {
            beep(880, 0.12); beep(880, 0.12, 0.6, 0.14); beep(1047, 0.30, 0.6, 0.28);
          }
          break;
        case 'finished':
          beep(880, 0.35); beep(880, 0.35, 0.6, 0.40); beep(880, 0.55, 0.6, 0.85);
          break;
      }
    }

    // ── Éléments DOM ──────────────────────────────────────────────────
    const timerEl     = document.getElementById('timer');
    const phaseEl     = document.getElementById('phase-label');
    const modeLabelEl = document.getElementById('mode-label');
    const roundEl     = document.getElementById('round-info');
    const dotsEl      = document.getElementById('round-dots');
    const statusEl    = document.getElementById('status-bar');
    const cdOverlay   = document.getElementById('countdown-overlay');
    const cdNumEl     = document.getElementById('countdown-number');
    const body        = document.body;

    function fmt(s) {
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return `${m}:${String(sec).padStart(2,'0')}`;
    }

    const PHASE_LABELS = {
      countdown: { work: '' },
      hiit:      { work: 'TRAVAIL', rest: 'REPOS' },
      grappling: { work: 'ROUND',   rest: 'REPOS' }
    };

    const MODE_LABELS = {
      countdown: 'COMPTE À REBOURS',
      hiit:      'INTERVALLES HIIT',
      grappling: 'GRAPPLING TIMER'
    };

    let lastEventSeq = -1;
    let lastStatus   = '';
    let goTimeout    = null;

    function triggerPop() {
      cdNumEl.classList.remove('pop');
      void cdNumEl.offsetWidth;
      cdNumEl.classList.add('pop');
    }

    const socket = io();

    socket.on('state', (s) => {

      // Tenter de débloquer l'audio à chaque event (sans interaction directe, surtout utile sur desktop)
      if (audioCtx?.state === 'suspended') audioCtx.resume();

      // ── Compte à rebours 3-2-1 ──────────────────────────────────────
      if (s.status === 'countdown') {
        cdOverlay.classList.remove('hidden');
        cdNumEl.className = 'pop';
        cdNumEl.textContent = s.countdownRemaining;
        triggerPop();
        beep(880, 0.10, 0.55);
        lastStatus = 'countdown';
        return;
      }

      // ── PARTEZ ! ─────────────────────────────────────────────────────
      if (s.event === 'started' && lastStatus === 'countdown') {
        cdOverlay.classList.remove('hidden');
        cdNumEl.className = 'go pop';
        cdNumEl.textContent = 'PARTEZ !';
        triggerPop();
        playGo();
        clearTimeout(goTimeout);
        goTimeout = setTimeout(() => cdOverlay.classList.add('hidden'), 750);
      } else if (lastStatus !== 'countdown') {
        cdOverlay.classList.add('hidden');
      }

      lastStatus = s.status;

      // ── Sons ─────────────────────────────────────────────────────────
      const isNewEvent = s.eventSeq !== lastEventSeq;
      lastEventSeq = s.eventSeq;

      if (isNewEvent && s.event) {
        if (s.event === 'warning') {
          beep(1047, 0.08, 0.38);
        } else if (s.event !== 'countdown_tick') {
          playEvent(s.event, s.phase);
        }
      }

      // ── Affichage ─────────────────────────────────────────────────
      timerEl.textContent = s.status === 'idle' ? '—:——' : fmt(s.phaseRemaining);

      const labels = PHASE_LABELS[s.mode] || {};
      phaseEl.textContent = s.status === 'idle' ? '' : (labels[s.phase] || '');

      modeLabelEl.textContent = s.status === 'idle' ? (MODE_LABELS[s.mode] || '') : '';

      if (s.mode !== 'countdown' && s.status !== 'idle') {
        roundEl.textContent = `ROUND ${s.currentRound} / ${s.totalRounds}`;
      } else {
        roundEl.textContent = '';
      }

      const statusMap = {
        idle:     'EN ATTENTE',
        running:  '',
        paused:   '⏸  PAUSE',
        finished: '✓  TERMINÉ'
      };
      statusEl.textContent = statusMap[s.status] ?? '';

      body.className = '';
      if (s.status === 'paused')   body.classList.add('paused');
      if (s.status === 'finished') body.classList.add('finished');
      if (s.phase === 'rest' && s.status === 'running')
        body.classList.add('phase-rest');
      if (s.status === 'running' && s.phaseRemaining <= 10 && s.phaseRemaining > 0)
        body.classList.add('warning');

      dotsEl.innerHTML = '';
      if (s.totalRounds > 1 && s.mode !== 'countdown') {
        for (let i = 1; i <= s.totalRounds; i++) {
          const d = document.createElement('div');
          d.className = 'dot';
          if (i < s.currentRound)        d.classList.add('done');
          else if (i === s.currentRound) {
            d.classList.add('current');
            if (s.phase === 'rest') d.classList.add('rest-dot');
          }
          dotsEl.appendChild(d);
        }
      }
    });

    // ── Télécommande Fire Stick ────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ' || e.keyCode === 13) {
        socket.emit('command', { action: 'toggle' });
        e.preventDefault();
      } else if (e.key === 'Backspace' || e.key === 'Escape' || e.keyCode === 8) {
        socket.emit('command', { action: 'reset' });
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
