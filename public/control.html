<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JJS Timer — Contrôle</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:      #0a0a0a;
      --card:    rgba(255,255,255,0.06);
      --border:  rgba(255,255,255,0.10);
      --text:    #f0f0f0;
      --muted:   #555;
      --red:     #C8102E;
      --orange:  #E8600A;
      --gray:    #888;
      --green:   #22c55e;
      --r:       16px;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Helvetica Neue', Arial, sans-serif;
      height: 100%;
      min-height: 100svh;
    }

    body {
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      padding: env(safe-area-inset-top, 12px) 16px
               calc(env(safe-area-inset-bottom, 0px) + 16px);
      gap: 14px;
    }

    /* ── Indicateur connexion ─────────────────────────────── */
    #conn-indicator {
      display: flex;
      align-items: center;
      gap: 7px;
      align-self: flex-end;
      font-size: 11px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--muted);
      padding-top: 4px;
    }
    #conn-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
    }
    #conn-dot.connected    { background: var(--green); }
    #conn-dot.disconnected { background: #ef4444; animation: blink-dot 1s infinite; }
    @keyframes blink-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

    /* ── Timer en direct ──────────────────────────────────── */
    #live-display {
      text-align: center;
      padding: 8px 0 4px;
    }
    #live-timer {
      font-size: clamp(72px, 22vw, 110px);
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--text);
      transition: color 0.3s;
    }
    #live-sub {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 6px;
      min-height: 20px;
    }
    #live-phase {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--red);
    }
    #live-round  { font-size: 12px; color: var(--muted); letter-spacing: 0.1em; }
    #live-status { font-size: 12px; color: var(--muted); letter-spacing: 0.18em; text-transform: uppercase; }

    .timer-warning  { color: var(--orange) !important; }
    .timer-finished { color: var(--red)    !important; }
    .timer-rest     { color: var(--gray)   !important; }
    .phase-rest     { color: var(--gray)   !important; }

    /* ── Sélecteur de mode (pills) ────────────────────────── */
    #mode-tabs {
      display: flex;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 4px;
      gap: 2px;
    }
    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      border-radius: 50px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 9px 6px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .tab-btn.active {
      background: var(--red);
      color: #fff;
    }
    .tab-btn:disabled { opacity: 0.35; cursor: default; }

    /* ── Panneau réglages ─────────────────────────────────── */
    #settings-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #settings-panel.locked {
      pointer-events: none;
      opacity: 0.35;
    }

    .mode-panel { display: flex; flex-direction: column; gap: 10px; }

    .settings-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .setting-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 12px 14px;
    }
    .setting-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .num-control {
      display: flex;
      align-items: center;
      gap: 0;
    }
    .num-btn {
      background: rgba(255,255,255,0.08);
      border: none;
      border-radius: 10px;
      color: var(--text);
      font-size: 22px;
      font-weight: 300;
      width: 44px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
      line-height: 1;
    }
    .num-btn:active { background: rgba(255,255,255,0.18); }
    .num-display {
      flex: 1;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    /* ── Boutons de contrôle ──────────────────────────────── */
    #controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ctrl-btn {
      border: none;
      border-radius: var(--r);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 18px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      text-transform: uppercase;
      width: 100%;
    }
    .ctrl-btn:active { transform: scale(0.98); opacity: 0.85; }
    .ctrl-btn:disabled { opacity: 0.25; cursor: default; }

    #btn-start { background: var(--red); color: #fff; }
    #btn-pause {
      background: transparent;
      color: var(--orange);
      border: 1.5px solid var(--orange);
    }
    #btn-reset {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid rgba(255,255,255,0.10);
      font-size: 13px;
      padding: 13px;
    }

    /* ── Lien TV ──────────────────────────────────────────── */
    #tv-link-bar {
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
      padding-bottom: 2px;
    }
    #tv-link-bar a { color: var(--red); text-decoration: none; opacity: 0.8; }
  </style>
</head>
<body>

  <!-- Connexion -->
  <div id="conn-indicator">
    <div id="conn-dot"></div>
    <span id="conn-label">Connexion…</span>
  </div>

  <!-- Timer -->
  <div id="live-display">
    <div id="live-timer">—:——</div>
    <div id="live-sub">
      <div id="live-phase"></div>
      <div id="live-round"></div>
      <div id="live-status">EN ATTENTE</div>
    </div>
  </div>

  <!-- Mode -->
  <div id="mode-tabs">
    <button class="tab-btn active" data-mode="countdown">↩ Rebours</button>
    <button class="tab-btn"       data-mode="hiit">⚡ HIIT</button>
    <button class="tab-btn"       data-mode="grappling">🥋 Grappling</button>
  </div>

  <!-- Réglages -->
  <div id="settings-panel">

    <!-- Compte à rebours -->
    <div id="panel-countdown" class="mode-panel">
      <div class="setting-card">
        <div class="setting-label">Durée</div>
        <div class="num-control">
          <button class="num-btn" data-target="cd-duration" data-step="-30">−</button>
          <span class="num-display" id="cd-duration-display">5:00</span>
          <button class="num-btn" data-target="cd-duration" data-step="30">+</button>
        </div>
      </div>
    </div>

    <!-- HIIT -->
    <div id="panel-hiit" class="mode-panel" style="display:none">
      <div class="settings-row">
        <div class="setting-card">
          <div class="setting-label">Travail</div>
          <div class="num-control">
            <button class="num-btn" data-target="hiit-work" data-step="-15">−</button>
            <span class="num-display" id="hiit-work-display">3:00</span>
            <button class="num-btn" data-target="hiit-work" data-step="15">+</button>
          </div>
        </div>
        <div class="setting-card">
          <div class="setting-label">Repos</div>
          <div class="num-control">
            <button class="num-btn" data-target="hiit-rest" data-step="-15">−</button>
            <span class="num-display" id="hiit-rest-display">1:00</span>
            <button class="num-btn" data-target="hiit-rest" data-step="15">+</button>
          </div>
        </div>
      </div>
      <div class="setting-card">
        <div class="setting-label">Rounds</div>
        <div class="num-control">
          <button class="num-btn" data-target="hiit-rounds" data-step="-1">−</button>
          <span class="num-display" id="hiit-rounds-display">5</span>
          <button class="num-btn" data-target="hiit-rounds" data-step="1">+</button>
        </div>
      </div>
    </div>

    <!-- Grappling -->
    <div id="panel-grappling" class="mode-panel" style="display:none">
      <div class="settings-row">
        <div class="setting-card">
          <div class="setting-label">Round</div>
          <div class="num-control">
            <button class="num-btn" data-target="grap-round" data-step="-30">−</button>
            <span class="num-display" id="grap-round-display">5:00</span>
            <button class="num-btn" data-target="grap-round" data-step="30">+</button>
          </div>
        </div>
        <div class="setting-card">
          <div class="setting-label">Repos</div>
          <div class="num-control">
            <button class="num-btn" data-target="grap-rest" data-step="-15">−</button>
            <span class="num-display" id="grap-rest-display">1:00</span>
            <button class="num-btn" data-target="grap-rest" data-step="15">+</button>
          </div>
        </div>
      </div>
      <div class="setting-card">
        <div class="setting-label">Rounds</div>
        <div class="num-control">
          <button class="num-btn" data-target="grap-rounds" data-step="-1">−</button>
          <span class="num-display" id="grap-rounds-display">5</span>
          <button class="num-btn" data-target="grap-rounds" data-step="1">+</button>
        </div>
      </div>
    </div>

  </div>

  <!-- Boutons -->
  <div id="controls">
    <div id="tv-link-bar">
      <a id="tv-link" href="/tv" target="_blank">Ouvrir sur la TV</a>
    </div>
    <button class="ctrl-btn" id="btn-start">▶  Démarrer</button>
    <button class="ctrl-btn" id="btn-pause" style="display:none">⏸  Pause</button>
    <button class="ctrl-btn" id="btn-reset">↺  Réinitialiser</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    // ── Valeurs par défaut ─────────────────────────────────
    const values = {
      'cd-duration':  300,
      'hiit-work':    180,
      'hiit-rest':     60,
      'hiit-rounds':    5,
      'grap-round':   300,
      'grap-rest':     60,
      'grap-rounds':    5
    };

    const mins = {
      'cd-duration': 30, 'hiit-work': 15, 'hiit-rest': 15,
      'hiit-rounds': 1, 'grap-round': 30, 'grap-rest': 15, 'grap-rounds': 1
    };
    const maxs = {
      'cd-duration': 3600, 'hiit-work': 1800, 'hiit-rest': 600,
      'hiit-rounds': 20, 'grap-round': 1800, 'grap-rest': 600, 'grap-rounds': 20
    };

    function fmt(s) {
      if (s < 60) return `0:${String(s).padStart(2,'0')}`;
      const m = Math.floor(s / 60), sec = s % 60;
      return `${m}:${String(sec).padStart(2,'0')}`;
    }

    function isTime(key) { return key !== 'hiit-rounds' && key !== 'grap-rounds'; }

    function updateDisplay(key) {
      const el = document.getElementById(key + '-display');
      if (!el) return;
      el.textContent = isTime(key) ? fmt(values[key]) : values[key];
    }

    Object.keys(values).forEach(k => updateDisplay(k));

    document.querySelectorAll('.num-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const key  = btn.dataset.target;
        const step = parseInt(btn.dataset.step, 10);
        values[key] = Math.min(maxs[key], Math.max(mins[key], values[key] + step));
        updateDisplay(key);
      });
    });

    // ── Mode tabs ──────────────────────────────────────────
    let currentMode = 'countdown';

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (btn.disabled) return;
        currentMode = btn.dataset.mode;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.querySelectorAll('.mode-panel').forEach(p => p.style.display = 'none');
        document.getElementById('panel-' + currentMode).style.display = '';
      });
    });

    // ── Socket ─────────────────────────────────────────────
    const socket = io({
      transports: ['polling', 'websocket'],   // polling d'abord — plus stable sur Railway
      reconnectionAttempts: Infinity,
      reconnectionDelay: 1000,
      reconnectionDelayMax: 5000,
      timeout: 10000
    });

    const connDot   = document.getElementById('conn-dot');
    const connLabel = document.getElementById('conn-label');

    socket.on('connect', () => {
      connDot.className = 'connected';
      connLabel.textContent = 'Connecté';
    });
    socket.on('disconnect', () => {
      connDot.className = 'disconnected';
      connLabel.textContent = 'Déconnecté…';
    });
    socket.on('connect_error', () => {
      connDot.className = 'disconnected';
      connLabel.textContent = 'Erreur réseau';
    });

    const liveTimerEl  = document.getElementById('live-timer');
    const livePhaseEl  = document.getElementById('live-phase');
    const liveRoundEl  = document.getElementById('live-round');
    const liveStatusEl = document.getElementById('live-status');
    const btnStart     = document.getElementById('btn-start');
    const btnPause     = document.getElementById('btn-pause');
    const btnReset     = document.getElementById('btn-reset');
    const settingsPanel= document.getElementById('settings-panel');

    const PHASE_LABELS = {
      countdown: { work: '' },
      hiit:      { work: 'TRAVAIL', rest: 'REPOS' },
      grappling: { work: 'ROUND',   rest: 'REPOS' }
    };

    socket.on('state', (s) => {
      const isCountdown = s.status === 'countdown';

      liveTimerEl.textContent = s.status === 'idle'
        ? '—:——'
        : isCountdown ? s.countdownRemaining : fmt(s.phaseRemaining);

      liveTimerEl.className = '';
      liveTimerEl.style.opacity = '';
      liveTimerEl.style.color   = '';
      if      (s.status === 'finished')                                  liveTimerEl.classList.add('timer-finished');
      else if (s.status === 'paused')                                    liveTimerEl.style.opacity = '0.4';
      else if (isCountdown)                                              liveTimerEl.style.color = '#fff';
      else if (s.phaseRemaining <= 10 && s.status === 'running')        liveTimerEl.classList.add('timer-warning');
      else if (s.phase === 'rest')                                       liveTimerEl.classList.add('timer-rest');

      const labels = PHASE_LABELS[s.mode] || {};
      livePhaseEl.textContent = (s.status !== 'idle' && !isCountdown) ? (labels[s.phase] || '') : '';
      livePhaseEl.className   = s.phase === 'rest' ? 'phase-rest' : '';

      liveRoundEl.textContent = (s.mode !== 'countdown' && s.status !== 'idle' && !isCountdown)
        ? `ROUND ${s.currentRound} / ${s.totalRounds}` : '';

      const statusMap = {
        idle:      'EN ATTENTE',
        countdown: `${s.countdownRemaining}…`,
        running:   'EN COURS',
        paused:    'PAUSE',
        finished:  'TERMINÉ'
      };
      liveStatusEl.textContent = statusMap[s.status] ?? '';

      if (s.status === 'running') {
        btnStart.style.display = 'none';
        btnPause.style.display = '';
        btnPause.textContent   = '⏸  Pause';
        btnPause.disabled      = false;
        settingsPanel.classList.add('locked');
        document.querySelectorAll('.tab-btn').forEach(b => b.disabled = true);
      } else if (isCountdown) {
        btnStart.style.display  = '';
        btnStart.textContent    = '⏳  Démarrage…';
        btnStart.disabled       = true;
        btnPause.style.display  = 'none';
        settingsPanel.classList.add('locked');
        document.querySelectorAll('.tab-btn').forEach(b => b.disabled = true);
      } else if (s.status === 'paused') {
        btnStart.style.display = '';
        btnStart.textContent   = '▶  Reprendre';
        btnStart.disabled      = false;
        btnPause.style.display = 'none';
        settingsPanel.classList.add('locked');
        document.querySelectorAll('.tab-btn').forEach(b => b.disabled = true);
      } else {
        btnStart.style.display = '';
        btnStart.textContent   = s.status === 'finished' ? '↺  Recommencer' : '▶  Démarrer';
        btnStart.disabled      = false;
        btnPause.style.display = 'none';
        settingsPanel.classList.remove('locked');
        document.querySelectorAll('.tab-btn').forEach(b => b.disabled = false);
      }
    });

    // ── Commandes ──────────────────────────────────────────
    function buildSettings() {
      return {
        countdown: { duration:      values['cd-duration'] },
        hiit:      { workDuration:  values['hiit-work'],
                     restDuration:  values['hiit-rest'],
                     rounds:        values['hiit-rounds'] },
        grappling: { roundDuration: values['grap-round'],
                     restDuration:  values['grap-rest'],
                     rounds:        values['grap-rounds'] }
      };
    }

    function sendCommand(action, payload) {
      if (!socket.connected) {
        connLabel.textContent = 'Reconnexion…';
        connDot.className = 'disconnected';
        // Réessayer une fois la reconnexion établie
        socket.once('connect', () => {
          socket.emit('command', { action, payload });
          connLabel.textContent = 'Connecté';
          connDot.className = 'connected';
        });
        return;
      }
      socket.emit('command', { action, payload });
    }

    btnStart.addEventListener('click', () => sendCommand('start', { mode: currentMode, settings: buildSettings() }));
    btnPause.addEventListener('click', () => sendCommand('pause'));
    btnReset.addEventListener('click', () => sendCommand('reset'));

    // Lien TV
    document.getElementById('tv-link').href = window.location.origin + '/tv';
  </script>
</body>
</html>
